<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>CUCUCINA — меню</title>
<style>
  * { margin:0; padding:0; box-sizing:border-box; }

  :root{
    --bg-dark:#ffffff;
    --bg-card:#ffffff;
    --bg-card2:#f2f2f2;
    --orange:#e08a3e;
    --text-light:#1c1c1e;
    --text-dim:#6b6b70;
    --radius:20px;
  }

  html, body{
    background:var(--bg-dark);
  }
  body{
    color:var(--text-light);
    font-family:'Segoe UI', Roboto, -apple-system, sans-serif;
    max-width:480px;
    margin:0 auto;
    min-height:100vh;
  }

  a, .clickable{ cursor:pointer; }

  /* ---------- ГЛАВНАЯ (тёмная тема) ---------- */
  .hero{
    position:relative;
    background:
      radial-gradient(circle at 8% 10%, #f2c94c 0 26px, transparent 27px),
      radial-gradient(circle at 92% 12%, #f2c94c 0 30px, transparent 31px),
      radial-gradient(circle at 90% 88%, #f2c94c 0 24px, transparent 25px),
      #eef0ea;
    height:190px;
    display:flex; align-items:center; justify-content:center;
  }
  .hero .logo{ text-align:center; color:#2c3e6b; }
  .hero .logo .name{ font-family:'Georgia', serif; font-size:30px; letter-spacing:6px; font-weight:600; }
  .hero .logo .sub{ font-size:11px; letter-spacing:4px; margin-top:6px; color:#5a6a94; }
  .hero .logo .sub::before, .hero .logo .sub::after{ content:"— "; }

  .lang-select{
    position:absolute; top:14px; right:14px;
    background:rgba(0,0,0,0.55); color:#fff; border-radius:20px; padding:6px 14px; font-size:13px;
  }

  .info-card{
    background:var(--bg-card); border-radius:24px 24px 0 0; margin-top:-22px;
    position:relative; padding:24px 20px 16px;
    box-shadow:0 -4px 16px rgba(0,0,0,0.06);
  }
  .info-card h1{ font-size:26px; font-weight:700; margin-bottom:14px; }
  .info-row{ display:flex; gap:10px; align-items:flex-start; font-size:14px; color:var(--text-dim); margin-bottom:10px; line-height:1.4; }
  .info-row svg{ flex-shrink:0; margin-top:2px; }
  .hours-label{ font-size:14px; color:var(--text-dim); margin:14px 0 4px; }
  .hours{ font-size:14px; color:var(--text-light); margin-bottom:2px; }

  .tabs{ display:flex; gap:10px; margin:18px 0 14px; }
  .tab{ padding:8px 20px; border-radius:20px; font-size:14px; font-weight:600; border:1.5px solid var(--orange); color:var(--orange); background:transparent; }
  .tab.active{ background:var(--orange); color:#1c1c1e; }

  .search{
    display:flex; align-items:center; background:#f0f0f0; border-radius:14px; padding:12px 14px;
    gap:10px; color:var(--text-dim); font-size:14px; margin-bottom:18px; border:none; width:100%; font-family:inherit;
  }
  .search svg{ flex-shrink:0; }
  .search svg path, .search svg line{ stroke:#8a8a8d; }

  .categories{ padding:0 20px 30px; display:flex; flex-direction:column; gap:16px; }
  .cat-card{
    position:relative; height:150px; border-radius:var(--radius); overflow:hidden;
    background-size:cover; background-position:center;
    display:flex; align-items:center; justify-content:center; text-align:center;
  }
  .cat-card::before{ content:""; position:absolute; inset:0; background:linear-gradient(180deg, rgba(0,0,0,0.25) 0%, rgba(0,0,0,0.45) 100%); }
  .cat-card span{
    position:relative; color:#fff; font-size:22px; font-weight:700; text-transform:uppercase; letter-spacing:1px;
    text-shadow:0 2px 8px rgba(0,0,0,0.5); padding:0 20px; line-height:1.3;
  }
  .cat-card .count{
    position:absolute; top:10px; right:12px; z-index:2; background:rgba(0,0,0,0.5); color:#fff;
    font-size:11px; padding:3px 9px; border-radius:12px; font-weight:600;
  }

  /* заглушки-цвета — замени на свои фото, см. инструкцию в конце файла (комментарий) */
  .c1{ background-image: url(https://dyj6gt4964deb.cloudfront.net/images/121837ea-65c3-4fd9-a153-38116cfbc4ed.jpeg); } .c2{ background-image: url(https://dyj6gt4964deb.cloudfront.net/images/crop-cc99dcda-cb7b-4a38-b73b-a3807bfdd598.jpeg); }
  .c3{ background-image: url(https://dyj6gt4964deb.cloudfront.net/images/crop-d5c62e26-4e09-4666-8321-fc1c535ee62d.jpeg); } .c4{ background-image: url(https://dyj6gt4964deb.cloudfront.net/images/crop-4a563c04-a0d9-41c8-94d6-68301def37d6.jpeg); }
  .c5{ background-image: url(https://dyj6gt4964deb.cloudfront.net/images/crop-13b55997-6f14-46b1-9779-da4731fe4a5b.jpeg); } .c6{ background-image: url(https://dyj6gt4964deb.cloudfront.net/images/crop-0336aae2-ab9c-4f23-81d6-41c1c07cfab4.jpeg); }
  .c7{ background-image: url(https://dyj6gt4964deb.cloudfront.net/images/crop-1f093bfb-0593-4a4e-bb90-5aeaa850f56a.jpeg); } .c8{ background-image: url(https://dyj6gt4964deb.cloudfront.net/images/crop-18b15f36-4b03-4884-a536-2d7c97831e95.jpeg); }
  .c9{ background-image: url(https://dyj6gt4964deb.cloudfront.net/images/crop-540f4612-cae7-47b0-b363-afff6a30570c.jpeg);} .c10{ background-image: url(https://dyj6gt4964deb.cloudfront.net/images/crop-f97d1cbe-3f87-482b-8089-e7ea9f4baf9f.jpeg); }

  /* ---------- СПИСОК БЛЮД (светлая тема, как в оригинале) ---------- */
  .light-page{
    background:#ffffff;
    color:#1c1c1e;
    min-height:100vh;
  }
  .page-header{
    display:flex; align-items:center; gap:14px;
    padding:16px 18px; position:sticky; top:0;
    background:#ffffff; z-index:10;
  }
  .back-btn{
    width:34px; height:34px; border-radius:50%;
    background:#f2f2f2; display:flex; align-items:center; justify-content:center; flex-shrink:0;
    box-shadow:0 1px 4px rgba(0,0,0,0.15);
  }
  .page-header h2{ font-size:17px; font-weight:700; color:#1c1c1e; }

  .dish-list{ padding:4px 18px 30px; display:flex; flex-direction:column; gap:22px; }


  .dish-photo{
    width:100%; height:190px; border-radius:18px; overflow:hidden;
    background-size:cover; background-position:center; margin-bottom:10px;
  }
  .dish-card .dish-name{ font-size:15px; font-weight:600; color:#1c1c1e; margin-bottom:4px; }
  .dish-card .dish-comp{ font-size:12.5px; color:#7a7a7d; line-height:1.4; margin:2px 0 4px; }
  .dish-card .dish-price{ font-size:17px; font-weight:700; color:var(--orange); }
  .dish-card .dish-price .suf{ font-size:12px; font-weight:400; color:#8a8a8a; margin-left:2px; }
  .dish-card .no-price{ font-size:13px; color:#c9922f; font-style:italic; }

  .dish-card .dish-desc{ font-size:12.5px; color:#7a7a7d; line-height:1.4; margin-top:6px; }
  .dish-card .dish-comp{ font-size:12.5px; color:#4a4a4d; line-height:1.4; margin-top:4px; }
  .dish-card .dish-comp b{ color:var(--orange); font-weight:600; }
  .dish-card .no-comp{ font-size:12.5px; color:#c9922f; margin-top:4px; }
  .dish-card .dish-meta{ display:flex; flex-wrap:wrap; gap:6px; margin-top:8px; }
  .pill{ font-size:10.5px; padding:3px 9px; border-radius:10px; background:#f0f0f0; color:#7a7a7d; }
  .pill.allergen{ background:#fdeaea; color:#c94f4f; }

  .empty-msg{ padding:40px 20px; text-align:center; color:#8a8a8d; font-size:14px; line-height:1.6; }
</style>
</head>

  wine: { label: 'Вино', categories: WINE_CATEGORIES, data: WINE_DATA },
};
let currentTab = 'food';

const svgPin = `<svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="#8a8a8d" stroke-width="2"><path d="M12 22s7-7.5 7-13a7 7 0 1 0-14 0c0 5.5 7 13 7 13z"/><circle cx="12" cy="9" r="2.5"/></svg>`;
const svgPhone = `<svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="#8a8a8d" stroke-width="2"><path d="M22 16.92v3a2 2 0 0 1-2.18 2 19.79 19.79 0 0 1-8.63-3.07 19.5 19.5 0 0 1-6-6 19.79 19.79 0 0 1-3.07-8.67A2 2 0 0 1 4.11 2h3a2 2 0 0 1 2 1.72c.127.96.361 1.903.7 2.81a2 2 0 0 1-.45 2.11L8.09 9.91a16 16 0 0 0 6 6l1.27-1.27a2 2 0 0 1 2.11-.45c.907.339 1.85.573 2.81.7A2 2 0 0 1 22 16.92z"/></svg>`;
const svgInsta = `<svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="#8a8a8d" stroke-width="2"><rect x="2" y="2" width="20" height="20" rx="5"/><circle cx="12" cy="12" r="4"/><circle cx="17.5" cy="6.5" r="1"/></svg>`;
const svgSearch = `<svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="#8a8a8d" stroke-width="2"><circle cx="11" cy="11" r="7"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg>`;
const svgBackDark = `<svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="#1c1c1e" stroke-width="2"><path d="M15 18l-6-6 6-6"/></svg>`;

function esc(s){
  return (s||'').toString().replace(/[&<>"']/g, m => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[m]));
}

function renderCatList(tab){
  const section = SECTIONS[tab];
  return `<div class="categories">${section.categories.map(([key, title, cls]) => {
    const count = (section.data[key] || []).length;
    return `<div class="cat-card ${cls} clickable" onclick="goCategory('${tab}','${key}')">
      <span>${esc(title)}</span>
      <div class="count">${count} поз.</div>
    </div>`;
  }).join('')}</div>`;
}

/* Шапка (лого, адрес, часы, вкладки, поиск) рендерится ОДИН раз и больше не перерисовывается —
   при переходах меняется только содержимое #content ниже неё. */
function renderHeaderOnce(){
  document.getElementById('header').innerHTML = `
    <div class="hero">
      <div class="lang-select">Русский</div>
      <div class="logo">
        <div class="name">CUCUCINA</div>
        <div class="sub">TRATTORIA PIZZERIA</div>
      </div>
    </div>
    <div class="info-card">
      <h1>CUCUCINA</h1>
      <div class="info-row">${svgPin}<span>ул. Ботира Закирова 7, Ташкент Сити Молл, 1 этаж, Ташкент, Узбекистан</span></div>
      <div class="info-row">${svgPhone}<span>33 088 03 18</span></div>
      <div class="info-row">${svgInsta}<span>La Dolce Vita</span></div>
      <div class="hours-label">график работы</div>
      <div class="hours">пн-чт 10:00 - 23:00</div>
      <div class="hours">пт-вс 10:00 - 00:00</div>
      <div class="tabs" id="tabsBar">
        ${Object.keys(SECTIONS).map(t => `<div class="tab ${t===currentTab?'active':''}" onclick="switchTab('${t}')">${SECTIONS[t].label}</div>`).join('')}
      </div>
      <input class="search" placeholder="Поиск" oninput="onSearch(this.value)">
    </div>
  `;
}

function switchTab(tab){
  currentTab = tab;
  document.getElementById('tabsBar').innerHTML =
    Object.keys(SECTIONS).map(t => `<div class="tab ${t===tab?'active':''}" onclick="switchTab('${t}')">${SECTIONS[t].label}</div>`).join('');
  showCategoryGrid(tab);
}

function renderDishCard(d, catCls){
  const priceHtml = d.price
    ? `<div class="dish-price">${esc(d.price)}<span class="suf">сум</span></div>`
    : `<div class="no-price">цена не указана — впиши вручную</div>`;
  const photoUrl = d.photo || (d.photoKey && PHOTO_MAP[d.photoKey]);
  const photoStyle = photoUrl ? ` style="background-image:url('${photoUrl}')"` : '';
  const photoCls = photoUrl ? '' : catCls;
  const compHtml = d.comp
    ? `<div class="dish-comp">${esc(d.comp)}</div>`
    : '';

  return `
    <div class="dish-card">
      <div class="dish-photo ${photoCls}"${photoStyle}></div>
      <div class="dish-name">${esc(d.name)}</div>
      ${compHtml}
      ${priceHtml}
    </div>
  `;
}

function renderCategory(tab, key){
  const section = SECTIONS[tab];
  const catEntry = section.categories.find(c => c[0] === key) || [key, 'МЕНЮ', 'c1'];
  const title = catEntry[1];
  const cls = catEntry[2];
  const dishes = section.data[key] || [];
  const listHtml = dishes.length
    ? dishes.map(d => renderDishCard(d, cls)).join('')
    : `<div class="empty-msg">Позиции для этой категории пока не добавлены.<br>Впиши их в ${tab === 'food' ? 'MENU_DATA' : (tab === 'bar' ? 'BAR_DATA' : 'WINE_DATA')} в начале файла.</div>`;

  return `
    <div class="light-page">
      <div class="page-header">
        <div class="back-btn clickable" onclick="showCategoryGrid(currentTab)">${svgBackDark}</div>
        <h2>${esc(title)}</h2>
      </div>
      <div class="dish-list">${listHtml}</div>
    </div>
  `;
}

let contentScrollY = 0;

/* Показываем список категорий текущей вкладки в #content, шапку не трогаем */
function showCategoryGrid(tab){
  document.getElementById('content').innerHTML = renderCatList(tab);
  window.scrollTo(0, contentScrollY);
}

function goCategory(tab, key){
  contentScrollY = window.scrollY;
  currentTab = tab;
  document.getElementById('content').innerHTML = renderCategory(tab, key);
}

function onSearch(q){
  q = q.trim();
  const content = document.getElementById('content');
  if(!q){
    showCategoryGrid(currentTab);
    return;
  }
  const section = SECTIONS[currentTab];
  const results = [];
  for(const [key,,cls] of section.categories){
    for(const d of (section.data[key]||[])){
      const hay = (d.name+' '+(d.comp||'')+' '+(d.desc||'')).toLowerCase();
      if(hay.includes(q.toLowerCase())) results.push([d,cls]);
    }
  }
  const listHtml = results.length
    ? results.map(([d,cls]) => renderDishCard(d,cls)).join('')
    : `<div class="empty-msg">Ничего не найдено</div>`;
  content.innerHTML = `<div class="dish-list">${listHtml}</div>`;
}

renderHeaderOnce();
showCategoryGrid(currentTab);
</script>

</body>
</html>
